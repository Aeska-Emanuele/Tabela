<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style> 
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #f2f4f8 0%, #d9e2ec 100%);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}
 table{
    width: 500px;
    margin: 0 auto;
 }

 td,th{
    border: 1px solid black;
     padding: 10px;
 }

caption{
font-size: 1.5em;
font-weight: bold;
padding: 10px;
background-color: lightgray;
}

thead, tfoot{
    background-color: rgb(92, 90, 92);
    color : white;
}

td.num{
    text-align: right;
}

    </style>

    
</head>
<body>
    <h1> Uso de tabelas grandes </h1>

    <!-- ANATOMIA PARA TABELAS GRANDES
     TABLE
     THEAD
        TR, TD, TH
     TBODY
        TR, TD, TH
     TFOOT
        TR, TD,TH
    -->

<table>

<caption>População das unidades Federativas</caption>

<thead>
<tr>
    <th scope="col">Estado</th>
    <th scope="col" style= "width: 50px;"> População</th>
</tr>
</thead>


<tbody>

<tr>
    <td>São Paulo</td>
    <td class='num'>45.919.049</td>
</tr>

<tr>
    <td>Minas Gerais</td>
    <td class='num'>21.411.923</td>
</tr>

<tr>
     <td>Rio de Janeiro</td>
     <td class='num'>13.864.964</td>
</tr>

<tr>
    <td>Bahia</td>
    <td class='num'>14.930.634</td>
</tr>

<tr>
    <td>Paraná</td>
    <td class='num'> 11.228.555</td>
</tr>

<tr>
    <td>Rio Grande do Sul</td>
    <td class='num'>888.964.752</td>
</tr>

</tbody>


<tfoot>
<tr>
    <th scope="row">Total Habitantes</th>
    <th class='num'> <strong>185.289.000</strong></th>
</tr>
</tfoot>

</table>

</body>
</
