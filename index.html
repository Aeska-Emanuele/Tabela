<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 400px;
            height: 400px;
            border-collapse: collapse;
            border: 2px solid black;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            border: 2px solid black;
            text-align: center; /*---Alinhamento Horizontal*/
            vertical-align: middle; /*---Alinhamento Vertical*/
        }

        .numero{
            text-align: right; /*---Para colocar numeros a direita, cmo no excel*/ /*colocar a classe normal no td*/
        }


    </style>
</head>
<body>
    <h1>TABELA</h1>

    <table>

        <tr> <!--Primeira linha-->
               <td>A1</td>
               <td>B1</td>
               <td>C1</td>
        </tr>

        <tr> <!--Segunda linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr> <!--Terceira linha-->
            <td>A3</td>
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>

        <tr> <!--Quarta linha-->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
            <td>C5</td>
            
        </tr>

    </table>
</body>
</html>
